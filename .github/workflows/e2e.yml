# .github/workflows/e2e.yml
name: E2E Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Deployed site URL to test, for example https://your-project.vercel.app'
        required: false
        type: string

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      E2E_BASE_URL: ${{ github.event.inputs.base_url || vars.E2E_BASE_URL || secrets.E2E_BASE_URL || secrets.VERCEL_PREVIEW_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Resolve E2E target URL
        shell: bash
        run: |
          if [ -z "$E2E_BASE_URL" ]; then
            echo "::error::No E2E base URL configured. Set repository variable or secret E2E_BASE_URL to the live Vercel URL, or set secret VERCEL_PREVIEW_URL, or run this workflow manually with the base_url input."
            exit 1
          fi

          case "$E2E_BASE_URL" in
            http://*|https://*) ;;
            *)
              echo "::error::E2E_BASE_URL must start with http:// or https://. Current value: $E2E_BASE_URL"
              exit 1
              ;;
          esac

          echo "Testing deployed site: $E2E_BASE_URL"

      - name: Check E2E target is reachable
        shell: bash
        run: |
          curl --fail --silent --show-error --location --max-time 20 "$E2E_BASE_URL" > /tmp/e2e-home.html

          if grep -Eqi 'DEPLOYMENT_NOT_FOUND|404: NOT_FOUND|Vercel.*404' /tmp/e2e-home.html; then
            echo "::error::E2E target appears to be a Vercel 404/deployment-not-found page: $E2E_BASE_URL"
            exit 1
          fi

      # Tests run against the configured deployed URL.
      # We avoid starting a local server in CI because production-only env vars
      # such as database URLs, API keys, and OAUTH_SERVER_URL are not available there.
      - name: Run Playwright tests
        run: pnpm exec playwright test
        env:
          CI: 'true'
          BASE_URL: ${{ env.E2E_BASE_URL }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
