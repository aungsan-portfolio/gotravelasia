# ─────────────────────────────────────────────────────────────────────────────
# Daily Flight Bot — fetches latest prices & auto-commits flight_data.json
# Runs at 20:30 UTC (03:00 AM MMT) every day + manual dispatch
# ─────────────────────────────────────────────────────────────────────────────

name: Daily Flight Bot

on:
  schedule:
    # 20:30 UTC = 03:00 AM Myanmar Time (UTC+6:30)
    - cron: "30 20 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run flight bot
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
        run: python scripts/flight_bot.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet client/public/data/flight_data.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push updated prices
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "flight-bot[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/data/flight_data.json
          git commit -m "chore(bot): update flight prices [$(date -u +%Y-%m-%d)]"
          git push
