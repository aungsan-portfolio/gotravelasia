<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; padding: 0; background: transparent; overflow: hidden; font-family: sans-serif; }
  </style>
</head>
<body>
  <script>
    const p = new URLSearchParams(window.location.search);
    const from = p.get('from') || '';
    const to = p.get('to') || '';
    const date = p.get('date') || '';
    const height = p.get('height') || '400';

    const script = document.createElement('script');
    script.src = 'https://cdn0.trainbusferry.com/tools/form/en/?id=14566451&domain=gotravelasia.12go.asia';
    script.setAttribute('data-one2go', '14566451');
    script.setAttribute('data-color', 'default');
    script.setAttribute('data-language', 'en');
    script.setAttribute('data-width', '100%');
    script.setAttribute('data-height', height);
    script.setAttribute('data-border', '0');
    script.setAttribute('data-starget', '_blank');
    script.setAttribute('data-domain', 'gotravelasia.12go.asia');
    script.setAttribute('data-curr', 'THB');

    if (from) script.setAttribute('data-origin', from);
    if (to) script.setAttribute('data-destination', to);
    if (date) {
      script.setAttribute('data-departure', date);
      script.setAttribute('data-date', date);
    }

    document.body.appendChild(script);
  </script>
</body>
</html>
